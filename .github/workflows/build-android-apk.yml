
name: Build Android APK (EAS)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo/EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Install jq (JSON parser)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Trigger Android build (APK)
        id: build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_JSON=$(eas build --platform android --profile internal --non-interactive --json)
          echo "$BUILD_JSON" > build-android.json
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.id // .[0].id')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Wait for EAS build to finish
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build:wait --non-interactive --build-id ${{ steps.build.outputs.build_id }}

      - name: Download Android artifact
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p artifacts
          eas build:download --non-interactive --build-id ${{ steps.build.outputs.build_id }} --path artifacts/iqorbit-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iqorbit-android-apk
          path: artifacts/iqorbit-android.apk
